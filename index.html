<!-- === SERVICE WORKER REGISTRATION === -->
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => {
                console.log('✅ Service Worker Registered', reg);

                console.log('❌ Service Worker Error:', err);
            });

</script>
